<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Quote Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div id="heading-div">
            <h1 id="big-heading">Random Quote Generator</h1>
            <button id="generate-button">Generate your Quote</button>
            <button id="toggleBtn">Light Mode</button>
        </div>

        <div id="generated-quotes-div">
            <h3 id="quote-heading"></h3>
            <p id="original-quote"></p>
            <p id="author-name"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
